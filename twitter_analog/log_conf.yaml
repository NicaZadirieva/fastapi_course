version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s - [%(levelname)s] - %(name)s - %(message)s - post_id: %(post_id)s"
    defaults:
      post_id: "-"

handlers:
  console:
    class: logging.StreamHandler
    stream: ext://sys.stdout
    formatter: default

root:
  level: INFO
  handlers: [console]
